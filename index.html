<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotary Club of Hall — Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9962A;
    --gold-light: #F5E6C0;
    --gold-dark: #8A6510;
    --navy: #1A2E4A;
    --navy-light: #2A4066;
    --white: #FDFAF4;
    --cream: #F7F1E3;
    --muted: #6B6350;
    --correct: #2D7A4F;
    --correct-bg: #E8F5EE;
    --wrong: #B03030;
    --wrong-bg: #FBE8E8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 16px 40px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(201,150,42,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(201,150,42,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    width: 100%;
    max-width: 460px;
    overflow: hidden;
    border: 1px solid rgba(201,150,42,0.2);
    position: relative;
    z-index: 1;
  }

  .card-header {
    background: var(--navy);
    padding: 22px 24px 18px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }
  .club-name {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--white);
    line-height: 1.2;
  }

  .card-body { padding: 28px 24px; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* Welcome */
  .date-badge {
    display: inline-block;
    background: var(--gold-light);
    color: var(--gold-dark);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    margin: 0 auto 16px;
  }
  .welcome-info {
    font-size: 16px;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .welcome-info strong { color: var(--navy); font-weight: 600; }

  /* Progress */
  .progress-wrap { margin-bottom: 20px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .progress-bar { height: 7px; background: var(--cream); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.5s ease; }

  /* Question */
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--navy);
    line-height: 1.5;
    text-align: center;
    margin-bottom: 24px;
    min-height: 80px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .option-btn {
    width: 100%;
    padding: 16px 18px;
    border-radius: var(--radius);
    border: 2px solid #E0D9CC;
    background: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 17px;
    color: var(--navy);
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-light); }
  .option-btn.selected { border-color: var(--navy); background: #EEF2F8; }
  .option-btn.correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
  .option-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .option-btn.unselected-after { opacity: 0.5; }
  .option-btn:disabled { cursor: default; }
  .opt-letter {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
    color: var(--muted);
  }
  .option-btn.correct .opt-letter,
  .option-btn.wrong .opt-letter { color: inherit; }

  /* Feedback banner */
  .feedback {
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 20px;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    display: none;
  }
  .feedback.correct { background: var(--correct-bg); color: var(--correct); border: 2px solid var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); color: var(--wrong); border: 2px solid var(--wrong); }

  /* Buttons */
  .btn {
    display: block; width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 18px;
    font-weight: 600;
    transition: all 0.15s;
    text-align: center;
  }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: var(--gold-dark); color: var(--white); }
  .btn-navy { background: var(--navy); color: var(--white); }
  .btn-navy:hover { background: var(--navy-light); }
  .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold-dark); font-size: 16px; }
  .btn-outline:hover { background: var(--gold-light); }
  .btn:disabled { opacity: 0.35; cursor: default; }

  /* Score */
  .score-display {
    text-align: center;
    padding: 12px 0 20px;
  }
  .score-number {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    color: var(--gold);
    line-height: 1;
  }
  .score-denom { font-size: 28px; color: var(--muted); }
  .score-msg {
    font-size: 18px;
    color: var(--navy);
    font-weight: 600;
    margin-top: 8px;
  }

  .divider { height: 1px; background: var(--cream); margin: 20px 0; }

  .results-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .result-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-radius: 10px;
    background: var(--cream);
    font-size: 15px;
    color: var(--navy);
    gap: 10px;
  }
  .result-item .r-label { flex: 1; line-height: 1.4; }
  .result-tick { color: var(--correct); font-size: 20px; font-weight: 700; flex-shrink: 0; }
  .result-cross { color: var(--wrong); font-size: 20px; font-weight: 700; flex-shrink: 0; }

  .welcome-center { text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="club-name">Rotary Club of Hall</div>
    <div class="app-title">Rotary International Quiz</div>
  </div>
  <div class="card-body">

    <!-- Welcome -->
    <div class="screen active" id="screen-welcome">
      <div class="welcome-center">
        <div class="date-badge" id="today-badge"></div>
      </div>
      <p class="welcome-info">
        <strong>10 questions</strong> · multiple choice<br>
        Everyone gets the <strong>same questions</strong> today.<br>
        How well do you know Rotary?
      </p>
      <button class="btn btn-gold" onclick="startQuiz()">Start quiz</button>
    </div>

    <!-- Question -->
    <div class="screen" id="screen-question">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="q-label">Question 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options-container"></div>
      <div class="feedback" id="feedback-banner"></div>
      <button class="btn btn-navy" id="btn-next" onclick="nextQuestion()" disabled>Next question →</button>
    </div>

    <!-- Results -->
    <div class="screen" id="screen-results">
      <div class="score-display">
        <div><span class="score-number" id="final-score">0</span><span class="score-denom">/10</span></div>
        <div class="score-msg" id="score-msg"></div>
      </div>
      <div class="divider"></div>
      <div class="results-list" id="results-list"></div>
      <button class="btn btn-outline" onclick="resetQuiz()">Play again</button>
    </div>

  </div>
</div>

<script>
const ALL_QUESTIONS = [
  { q: "In what year was Rotary International founded?", opts: ["1895","1900","1905","1912"], ans: 2 },
  { q: "Who founded Rotary International?", opts: ["Herbert Taylor","Paul Harris","Arch Klumph","Chesley Perry"], ans: 1 },
  { q: "In which city was the first Rotary club formed?", opts: ["New York","London","Chicago","Sydney"], ans: 2 },
  { q: "What is the Rotary motto?", opts: ["Service Above Self","One Profits Most Who Serves Best","Together We Serve","Fellowship and Service"], ans: 0 },
  { q: "How many parts does the Rotary Four-Way Test have?", opts: ["Three","Four","Five","Six"], ans: 1 },
  { q: "What does the Rotary wheel emblem represent?", opts: ["Global friendship","Industry and motion","Peace and unity","Community service"], ans: 1 },
  { q: "How many spokes does the Rotary wheel have?", opts: ["12","16","24","6"], ans: 1 },
  { q: "What is the name of Rotary's youth exchange program?", opts: ["Rotaract","Interact","Youth Exchange","New Generations"], ans: 2 },
  { q: "Rotaract clubs are for people aged:", opts: ["14–18","18–35","25–40","Under 14"], ans: 1 },
  { q: "Where is Rotary International's world headquarters?", opts: ["Washington D.C.","London","Evanston, Illinois","Geneva"], ans: 2 },
  { q: "What disease has Rotary nearly eradicated through its PolioPlus campaign?", opts: ["Malaria","Smallpox","Polio","Tuberculosis"], ans: 2 },
  { q: "The Rotary Foundation was established in what year?", opts: ["1917","1928","1945","1955"], ans: 0 },
  { q: "What is the name of Rotary's youth leadership program?", opts: ["RYLA","Interact","Rotaract","Youth Exchange"], ans: 0 },
  { q: "Which of these is one of Rotary's six Areas of Focus?", opts: ["Climate change advocacy","Peace and conflict prevention","Political reform","Economic growth"], ans: 1 },
  { q: "Rotary International has clubs in approximately how many countries?", opts: ["100","150","200","More than 200"], ans: 3 },
  { q: "What is the approximate number of Rotary clubs worldwide?", opts: ["5,000","15,000","35,000","60,000"], ans: 2 },
  { q: "The Rotary year begins on:", opts: ["1 January","1 July","1 September","1 April"], ans: 1 },
  { q: "What does RYLA stand for?", opts: ["Rotary Young Leaders Award","Rotary Youth Leadership Awards","Rotary Youth Learning Activities","Rotary Young Learners Association"], ans: 1 },
  { q: "The Four-Way Test was created in which decade?", opts: ["1910s","1920s","1930s","1940s"], ans: 2 },
  { q: "Who created the Four-Way Test?", opts: ["Paul Harris","Herbert Taylor","Arch Klumph","Chesley Perry"], ans: 1 },
  { q: "Interact clubs are for young people aged:", opts: ["12–18","14–18","16–21","18–25"], ans: 1 },
  { q: "What are the two main colours of the Rotary International logo?", opts: ["Red and gold","Blue and gold","Navy and silver","Gold and white"], ans: 1 },
  { q: "Which Rotary program supports vocational training?", opts: ["Rotaract","Vocational Training Teams","Peace Fellowships","RYLA"], ans: 1 },
  { q: "Rotary's PolioPlus program was launched in:", opts: ["1975","1985","1995","2000"], ans: 1 },
  { q: "What is a Rotary 'Paul Harris Fellow'?", opts: ["A founding member","An honorary recognition for significant contributions","A club president","A district governor"], ans: 1 },
  { q: "Which first in Rotary history happened in 1987?", opts: ["First woman member admitted","First club outside the USA","First international convention","First Peace Fellowship awarded"], ans: 0 },
  { q: "Rotary International's annual convention is held:", opts: ["Every two years","Every year","Every five years","Monthly"], ans: 1 },
  { q: "Which statement is part of the Four-Way Test?", opts: ["Is it kind?","Will it be beneficial to all concerned?","Does it serve the community?","Is it legal?"], ans: 1 },
  { q: "How many Rotary Peace Centers exist worldwide?", opts: ["3","6","10","12"], ans: 1 },
  { q: "In which decade did Rotary expand outside the USA for the first time?", opts: ["1900s","1910s","1920s","1930s"], ans: 1 },
  { q: "Rotary clubs traditionally meet:", opts: ["Monthly","Weekly","Fortnightly","Quarterly"], ans: 1 },
  { q: "Which is NOT one of Rotary's six Areas of Focus?", opts: ["Maternal and child health","Basic education and literacy","Climate activism","Water and sanitation"], ans: 2 },
  { q: "The Rotary emblem is sometimes called:", opts: ["The Service Wheel","The Gear Wheel","The Cogwheel","The Rotary Cog"], ans: 2 },
  { q: "What year did Rotary reach one million members?", opts: ["1950","1960","1969","1980"], ans: 2 },
  { q: "A Rotary 'District' is:", opts: ["A national organisation","A geographic grouping of clubs","An international committee","A type of membership"], ans: 1 },
  { q: "Rotary's 'End Polio Now' campaign partners with which organisation?", opts: ["WHO only","UNICEF only","Bill & Melinda Gates Foundation only","All of the above"], ans: 3 },
  { q: "The first Rotary club outside North America was formed in:", opts: ["Australia","Great Britain","India","Germany"], ans: 1 },
  { q: "What is the maximum duration of a Rotary International presidential term?", opts: ["6 months","1 year","2 years","3 years"], ans: 1 },
  { q: "Which Rotary program awards graduate-level university scholarships?", opts: ["Paul Harris Fellows","Rotary Peace Fellowships","RYLA grants","Vocational Training Teams"], ans: 1 },
  { q: "The Rotary Club of Hall is located near which Australian city?", opts: ["Sydney","Canberra","Melbourne","Hobart"], ans: 1 },
  { q: "What does 'Service Above Self' mean in Rotary context?", opts: ["Volunteering full time","Placing community needs before personal gain","Donating all profits","Serving anonymously"], ans: 1 },
  { q: "Which statement is TRUE about the Four-Way Test?", opts: ["It was written by Paul Harris","It has been translated into over 100 languages","It was adopted in 1905","It applies only to business"], ans: 1 },
  { q: "Rotary's literacy programs primarily target:", opts: ["University students","Adults and children in developing regions","Professional training","Online education"], ans: 1 },
  { q: "What does 'Every Rotarian Every Year' encourage?", opts: ["Annual convention attendance","All members to contribute to the Rotary Foundation","Weekly meeting attendance","Community service hours"], ans: 1 },
  { q: "Paul Harris was born in which country?", opts: ["Canada","Australia","United States","United Kingdom"], ans: 2 },
  { q: "The Rotary International theme is set by whom each year?", opts: ["The board of directors","The RI president","A member vote","The Rotary Foundation"], ans: 1 },
  { q: "Which country has the most Rotary clubs?", opts: ["India","Japan","United States","Brazil"], ans: 2 },
  { q: "Rotary's peacebuilding fellows study at:", opts: ["Harvard only","Oxford only","Universities around the world","The UN headquarters"], ans: 2 },
  { q: "The four-way test asks: 'Is it the TRUTH?' — what is the second question?", opts: ["Is it kind?","Is it fair to all concerned?","Will it be beneficial?","Is it legal?"], ans: 1 },
  { q: "What colour is the Rotary International logo background?", opts: ["Navy blue","Royal blue","Gold","White"], ans: 0 },
  { q: "Which Rotary program focuses on youth ages 12–18?", opts: ["Rotaract","RYLA","Interact","Youth Exchange"], ans: 2 },
  { q: "Rotary International was originally called:", opts: ["The Rotary Club","The Chicago Rotary Club","The National Rotary Club","The Service Club"], ans: 0 },
  { q: "The Rotary Foundation's major grant program is called:", opts: ["Global Grant","Major Grant","Service Grant","Foundation Grant"], ans: 0 },
  { q: "Which is a core Rotary value?", opts: ["Profit","Fellowship","Hierarchy","Competition"], ans: 1 },
  { q: "Rotary's PolioPlus has helped immunise how many children?", opts: ["1 million","50 million","2.5 billion","100 million"], ans: 2 },
  { q: "What is the name of Rotary's membership magazine?", opts: ["The Rotarian","Rotary Today","Service Above Self","The Rotary Review"], ans: 0 },
  { q: "In Rotary, what is a 'satellite club'?", opts: ["A club in another country","A smaller group linked to a sponsor club","An online-only club","A club for young professionals only"], ans: 1 },
  { q: "Which famous leader was a Rotarian?", opts: ["Winston Churchill","John F. Kennedy","Nelson Mandela","Mahatma Gandhi"], ans: 0 },
  { q: "Rotary's Areas of Focus include economic and community development — True or False?", opts: ["True","False","Only in developed countries","Only since 2010"], ans: 0 },
  { q: "The Rotary Foundation Cadets program trains people in:", opts: ["Business leadership","Peacebuilding and diplomacy","Agricultural development","Medical research"], ans: 1 },
  { q: "What is the Rotary Action Group (RAG)?", opts: ["A fundraising committee","A network focusing on specific humanitarian causes","A youth leadership body","A political lobby group"], ans: 1 },
  { q: "The Four-Way Test ends with which question?", opts: ["Is it the truth?","Will it build goodwill?","Will it be beneficial to all concerned?","Is it fair?"], ans: 2 },
  { q: "Rotary International's official languages include:", opts: ["English only","English and French","English, French, German, Japanese, Korean, Portuguese, Spanish","English and Spanish only"], ans: 2 },
  { q: "What does the term 'vocational service' mean in Rotary?", opts: ["Serving through one's profession","Volunteering in schools","Running training programs","Fundraising for charities"], ans: 0 },
  { q: "Rotary's clean water projects are part of which Area of Focus?", opts: ["Health","Environment","Water, sanitation and hygiene","Economic development"], ans: 2 },
  { q: "Where was the first Rotary International Convention held?", opts: ["Chicago","Portland, Oregon","New York","Washington D.C."], ans: 1 },
  { q: "Rotary Foundation 'District Grants' are used for:", opts: ["International projects only","Local and international humanitarian activities","Club administration","Staff salaries"], ans: 1 },
  { q: "How does Rotary define 'service above self'?", opts: ["Working without pay","Prioritising the needs of others","Donating more than 10% of income","Volunteering overseas"], ans: 1 },
  { q: "The Rotary motto 'Service Above Self' is complemented by which secondary motto?", opts: ["One World, One Rotary","He Profits Most Who Serves Best","Together We Can Change the World","Peace Through Service"], ans: 1 },
  { q: "Which Rotary program specifically addresses maternal and child health?", opts: ["PolioPlus","Maternal Child Health Volunteers","Health Initiative","Healthy Families"], ans: 1 },
  { q: "Rotary's global alumni network numbers approximately:", opts: ["500,000","1 million","Over 1 million","250,000"], ans: 2 },
  { q: "What type of organisation is Rotary International?", opts: ["Government body","Non-governmental service organisation","United Nations agency","Religious organisation"], ans: 1 },
  { q: "How many members does Rotary International have approximately?", opts: ["500,000","1.2 million","2 million","5 million"], ans: 1 },
];

const LETTERS = ['A','B','C','D'];

let questions = [];
let currentQ = 0;
let score = 0;
let answers = [];

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function selectQuestions() {
  const rand = seededRandom(getTodaySeed());
  const pool = [...ALL_QUESTIONS];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 10);
}

function formatDate() {
  return new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  questions = selectQuestions();
  currentQ = 0;
  score = 0;
  answers = [];
  showQuestion();
  showScreen('screen-question');
}

function showQuestion() {
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('q-label').textContent = `Question ${currentQ + 1} of ${total}`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(currentQ / total) * 100}%`;
  document.getElementById('question-text').textContent = q.q;

  const fb = document.getElementById('feedback-banner');
  fb.style.display = 'none';
  fb.className = 'feedback';

  const btn = document.getElementById('btn-next');
  btn.disabled = true;
  btn.textContent = currentQ < questions.length - 1 ? 'Next question →' : 'See my results';

  const container = document.getElementById('options-container');
  container.innerHTML = q.opts.map((opt, i) =>
    `<button class="option-btn" onclick="selectAnswer(${i})">
      <span class="opt-letter">${LETTERS[i]}</span>${opt}
    </button>`
  ).join('');
}

function selectAnswer(idx) {
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const correct = idx === q.ans;
  if (correct) score++;

  btns[q.ans].classList.add('correct');
  if (!correct) btns[idx].classList.add('wrong');
  btns.forEach((b, i) => {
    if (i !== q.ans && i !== idx) b.classList.add('unselected-after');
  });

  const fb = document.getElementById('feedback-banner');
  fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
  fb.textContent = correct
    ? '✓ Correct!'
    : `✗ The answer is: ${q.opts[q.ans]}`;
  fb.style.display = 'block';

  answers.push({ label: q.q.length > 48 ? q.q.slice(0, 48) + '…' : q.q, correct });

  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('progress-fill').style.width = '100%';

  const msgs = [
    [10, '🏆 Perfect score — Rotary genius!'],
    [8,  '⭐ Excellent — you really know your Rotary!'],
    [6,  '👍 Well done — solid Rotarian!'],
    [4,  '📚 Good effort — keep learning!'],
    [0,  '💪 Room to grow — great for trying!'],
  ];
  const msg = msgs.find(([min]) => score >= min)[1];

  document.getElementById('final-score').textContent = score;
  document.getElementById('score-msg').textContent = msg;

  const list = document.getElementById('results-list');
  list.innerHTML = answers.map(a =>
    `<div class="result-item">
      <span class="r-label">${a.label}</span>
      ${a.correct
        ? '<span class="result-tick">✓</span>'
        : '<span class="result-cross">✗</span>'}
    </div>`
  ).join('');

  showScreen('screen-results');
}

function resetQuiz() {
  showScreen('screen-welcome');
}

// Init date badge
document.getElementById('today-badge').textContent = formatDate();
</script>
</body>
</html>
